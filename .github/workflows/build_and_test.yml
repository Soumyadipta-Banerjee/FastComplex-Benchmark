name: Build and Benchmark

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up C++ Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libomp-dev

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install matplotlib pandas

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build --config Release -j $(nproc)

    - name: Run Benchmarks
      run: |
        cd build
        ./benchmark_main --benchmark_out=benchmark_results.json --benchmark_out_format=json

    - name: Generate Plots
      run: |
        cd build
        python3 ../scripts/plot_results.py benchmark_results.json

    - name: Upload Plot Artifact
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: build/benchmark_results.png
